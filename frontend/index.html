<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedTriageAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #2d3748;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: #ebf8ff;
      color: #2b6cb0;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    h1 span { color: #3182ce; }
    p { font-size: 16px; color: #718096; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">En cours de développement</div>
    <h1>Med<span>Triage</span>AI</h1>
    <p>Frontend coming soon.</p>
  </div>
</body>
</html>
